# Netlify — Hawkeye Sterling v5 monorepo.
#
# Build order:
#   1. Root: `npm ci && npm run build` → compiles src/brain (TypeScript → dist/).
#   2. web/: `npm ci && npm run build` → builds Next.js 14 app (SSR + API routes).
#
# The Next.js route handler at web/app/api/quick-screen/route.ts imports the
# compiled brain from ../../../../../dist/src/brain/quick-screen.js, so step 1
# must complete before step 2.

[build]
  command = "npm ci --include=dev && npm run build && node scripts/gen-weaponized-brain.cjs && cd web && npm ci --include=dev && npm run build"
  publish = "web/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Look for the scheduled Netlify Function(s) at the repo root.
  directory = "netlify/functions"
  # Bundle the compiled brain + policy modules (weaponized.ts imports
  # ../policy/systemPrompt.js transitively) with every Netlify function.
  included_files = [
    "dist/src/brain/**/*.js",
    "dist/src/brain/**/*.js.map",
    "dist/src/policy/**/*.js",
    "dist/src/policy/**/*.js.map",
  ]

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
