# Netlify — Hawkeye Sterling v5 monorepo.
#
# Build order:
#   1. Root: `npm ci && npm run build` → compiles src/brain (TypeScript → dist/).
#   2. web/: `npm ci && npm run build` → builds Next.js 14 app (SSR + API routes).
#
# The Next.js route handler at web/app/api/quick-screen/route.ts imports the
# compiled brain from ../../../../../dist/src/brain/quick-screen.js, so step 1
# must complete before step 2.

[build]
  command = "npm ci --include=dev && npm run build && node scripts/gen-weaponized-brain.cjs && cd web && npm ci --include=dev && npm run build"
  publish = "web/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Look for the scheduled Netlify Function(s) at the repo root.
  directory = "netlify/functions"
  # Bundle the compiled brain + policy + integrations modules.
  # weaponized.ts imports ../policy/systemPrompt.js transitively, and the
  # mlro-advisor-deep-background function imports invokeMlroAdvisor +
  # the quality gates from dist/src/integrations.
  included_files = [
    "dist/src/brain/**/*.js",
    "dist/src/brain/**/*.js.map",
    "dist/src/policy/**/*.js",
    "dist/src/policy/**/*.js.map",
    "dist/src/integrations/**/*.js",
    "dist/src/integrations/**/*.js.map",
  ]

# Cold-start mitigation (audit follow-up #37). The
# `netlify/functions/warm-pool.mts` scheduled function pings the hot-path
# API routes every 4 minutes (well inside the AWS Lambda ~15-minute idle
# reclamation window). Combined with platform-side region-pinning this
# gives sub-300ms p95 cold starts on the screening path. Requires
# Netlify Pro plan + paid scheduler tier.

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # CSP: self-only for scripts/styles; allow Asana + Anthropic API calls from
    # the server-side edge (connect-src covers fetch() from the browser). The
    # nonce-based approach would require Next.js middleware; this initial policy
    # blocks the highest-risk categories (inline scripts, arbitrary framing).
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://app.asana.com https://api.anthropic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
