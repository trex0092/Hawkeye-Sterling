# Netlify — monorepo config. Builds the root brain (tsc → dist/) first so the
# V2 UI's Netlify function can import from ../../../dist/src/brain/quick-screen.js,
# then builds the V2 UI via Vite. Paths are all repo-root relative.

[build]
  command = "npm ci && npm run build && cd hawkeye-sterling-v2-production && npm ci && npm run build"
  functions = "hawkeye-sterling-v2-production/netlify/functions"
  publish = "hawkeye-sterling-v2-production/dist"

[functions]
  # Ensure the compiled brain is bundled with each function invocation.
  included_files = ["dist/src/brain/**/*.js", "dist/src/brain/**/*.js.map"]

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "preview" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
