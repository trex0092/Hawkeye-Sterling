# Netlify — Hawkeye Sterling v5 monorepo. Build 2026-06-02.
#
# Build order:
#   1. Root: `npm ci && npm run build` → compiles src/brain (TypeScript → dist/).
#   2. web/: `npm ci && npm run build` → builds Next.js 15 app (SSR + API routes).
#
# The Next.js route handler at web/app/api/quick-screen/route.ts imports the
# compiled brain from ../../../../../dist/src/brain/quick-screen.js, so step 1
# must complete before step 2.

[build]
  # Step markers (>>> HS-STEP-N) make the failing step instantly findable
  # in the Netlify deploy log. Whichever marker is the LAST printed before
  # exit identifies the step that failed. Each step's exit code is also
  # echoed so a non-zero from a piped command is visible. `set -euo pipefail`
  # ensures any unset variable or pipe failure propagates.
  # Both HS-STEP-1 (root) and HS-STEP-4 (web/) use `npm ci` for fully
  # reproducible builds against the committed package-lock.json. Previous
  # use of `npm install` caused non-deterministic ERESOLVE failures (same
  # commit succeeded then failed minutes later as npm resolved different
  # transitive dep versions). Switch to `npm ci` verified 2026-05-18.
  command = "bash scripts/build.sh"
  publish = "web/.next"

[build.environment]
  NODE_VERSION = "22"
  # Node heap cap for the build. MUST stay BELOW the Netlify build
  # container's physical RAM, not above it. Setting it to 8192 (a prior
  # guess) was the actual cause of the persistent "exit code 2" failures:
  # telling V8 it may grow to 8 GB makes it defer GC until 8 GB, so on a
  # build agent without 8 GB free the kernel OOM-kills the process before
  # GC ever runs — surfacing as a generic non-zero (exit 2) with no JS
  # heap-OOM stack trace. Confirmed: the full build script runs to exit 0
  # locally under the same `ulimit -n 4096` as the Netlify agent, and the
  # webpack compile finishes in <3 min using far less than 8 GB — so the
  # large cap bought nothing and only removed the headroom the container
  # needs for the OS, webpack workers, and @netlify/plugin-nextjs.
  # 4096 is Netlify's documented safe default: enough heap for this build
  # (default ~1.5 GB previously OOM'd; 4 GB clears it) while leaving the
  # container room to breathe. Do NOT raise this above the agent's RAM.
  NODE_OPTIONS = "--max-old-space-size=4096"
  # Disable Next.js telemetry in the build agent. Without this, next build
  # attempts a network call to telemetry.nextjs.org on every compilation;
  # if the Netlify build agent's outbound network is slow or the endpoint
  # is unreachable, the call blocks for several seconds and can contribute
  # to timeout-related build failures (exit code 4).
  NEXT_TELEMETRY_DISABLED = "1"
  # NEXT_PUBLIC_COMMIT_SHA is injected via the build command (NEXT_PUBLIC_COMMIT_SHA=$COMMIT_REF npm run build)
  # because TOML [build.environment] values are NOT shell-expanded — "$COMMIT_REF" would be
  # stored as the literal 7-char string, making .slice(0,7) return "$COMMIT".
  # Exclude LSEG credential env vars from Netlify secrets scanning so that
  # any incidental appearance of credentials in build logs or docs doesn't
  # block the deploy.  The actual values are never committed to source.
  # GITHUB_TOKEN is added because the build uses it for the code-scan scheduled
  # function that fetches source files for AI security analysis. The token value
  # is only used at function runtime, never embedded in build artifacts.
  SECRETS_SCAN_OMIT_KEYS = "LSEG_USERNAME,LSEG_PASSWORD,LSEG_APP_KEY,LSEG_SQS_ENDPOINT,GITHUB_TOKEN"
  # UAE seed file paths (non-sensitive paths — actual JSON files are committed to the repo).
  # The JSON files are empty templates; populate them manually from EOCN email updates.
  # Do NOT set these here if they differ per deploy context — use Netlify env vars instead.
  UAE_EOCN_SEED_PATH = "data/seeds/uae_eocn_seed.json"
  UAE_LTL_SEED_PATH = "data/seeds/uae_ltl_seed.json"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[edge_functions]]
  function = "fetch-relay"
  path = "/.netlify/edge-functions/fetch-relay"

[functions]
  # Look for the scheduled Netlify Function(s) at the repo root.
  directory = "netlify/functions"
  # Bundle the compiled brain + policy + integrations modules.
  # weaponized.ts imports ../policy/systemPrompt.js transitively, and the
  # mlro-advisor-deep-background function imports invokeMlroAdvisor +
  # the quality gates from dist/src/integrations.
  included_files = [
    "dist/src/brain/**/*.js",
    "dist/src/brain/**/*.js.map",
    "dist/src/policy/**/*.js",
    "dist/src/policy/**/*.js.map",
    "dist/src/integrations/**/*.js",
    "dist/src/integrations/**/*.js.map",
    "data/**",
  ]

# MLRO deep background function — needs the full 15-minute platform ceiling
# (900 s) because the multi-perspective advisor pipeline can run three parallel
# Haiku calls followed by a synthesis pass.
[functions."mlro-advisor-deep-background"]
  timeout = 900

# Nightly sanctions-refresh background worker (POSTed to by the 03:00 UTC
# refresh-lists scheduled trigger). Background class via the -background
# filename suffix; the 15-minute ceiling lets the slow government adapters
# (au_dfat XLSX, ch_seco SESAM, eu_fsf webgate) run with a 60 s per-adapter
# leash instead of the 20 s scheduled-function leash they timed out at.
[functions."refresh-lists-background"]
  timeout = 900

[functions."gdelt-prefetch"]
  timeout = 60

[functions."asana-daily-module-update"]
  timeout = 300

# Cold-start mitigation (audit follow-up #37). The
# `netlify/functions/warm-pool.mts` scheduled function pings the hot-path
# API routes every 4 minutes (well inside the AWS Lambda ~15-minute idle
# reclamation window). Combined with platform-side region-pinning this
# gives sub-300ms p95 cold starts on the screening path. Requires
# Netlify Pro plan + paid scheduler tier.

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  # NEXT_PUBLIC_APP_URL must be set in Netlify dashboard → Site settings →
  # Environment variables → Context: Deploy previews.
  # Set it to your preview domain pattern (e.g. https://deploy-preview-*--<site>.netlify.app)
  # or to the canonical site URL. Without it, the CORS origin in adverse-media/route.ts
  # falls back to the hardcoded production URL, which blocks CORS for preview deploy origins.
  # Netlify injects DEPLOY_URL and URL at runtime — those are not available at build time
  # so they cannot be used here; they must be read server-side from process.env instead.
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Deny every powerful/sensitive browser feature the portal never uses, and
    # opt out of FLoC/Topics ad-interest tracking. Kept in sync with the
    # dynamic surface in web/middleware.ts (applySecurityHeaders).
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=(), browsing-topics=()"
    # COOP=same-origin isolates the browsing context from cross-origin
    # popups/iframes — reduces Spectre attack surface. Safe addition.
    # NOTE: COEP=require-corp deliberately omitted — it would require
    # fonts.bunny.net responses to carry CORP=cross-origin, which they
    # don't, so enabling it would break the font load and the login page.
    Cross-Origin-Opener-Policy = "same-origin"
    # CSP is now set per-request by web/middleware.ts with a fresh nonce,
    # so 'unsafe-inline' is no longer needed. Multiple CSP headers
    # *intersect* (most-restrictive wins), so a static fallback here
    # would clash with the middleware-set policy. API routes (which don't
    # render HTML) get no CSP — script-src is moot for JSON responses.

# CORP=same-origin on API responses prevents cross-origin documents from
# embedding our JSON via <img>/<script> spec quirks. Defense-in-depth
# alongside the enforce() auth gate. Cache-Control: no-store ensures
# auth-dependent responses aren't cached at edge / browser layer.
[[headers]]
  for = "/api/*"
  [headers.values]
    Cross-Origin-Resource-Policy = "same-origin"
    Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"
