# Netlify — Hawkeye Sterling v5 monorepo.
#
# Build order:
#   1. Root: `npm ci && npm run build` → compiles src/brain (TypeScript → dist/).
#   2. web/: `npm ci && npm run build` → builds Next.js 15 app (SSR + API routes).
#
# The Next.js route handler at web/app/api/quick-screen/route.ts imports the
# compiled brain from ../../../../../dist/src/brain/quick-screen.js, so step 1
# must complete before step 2.

[build]
  # Step markers (>>> HS-STEP-N) make the failing step instantly findable
  # in the Netlify deploy log. Whichever marker is the LAST printed before
  # exit identifies the step that failed. Each step's exit code is also
  # echoed so a non-zero from a piped command is visible. `set -o pipefail`
  # ensures pipe failures (not just final command) propagate.
  # HS-STEP-1 uses `npm install` (not `npm ci`) so that adding/removing
  # a root-only dep — most notably the optional `exceljs` for the
  # XLSX-format sanctions adapters (UAE EOCN / AU DFAT / JP MOF) — does
  # NOT require committing a regenerated package-lock.json. Trade-off
  # accepted: builds may pull slightly different transitive versions
  # between deploys. The Next.js step (HS-STEP-4) keeps `npm ci` for
  # the web tree where reproducibility matters more.
  command = "bash scripts/build.sh"
  publish = "web/.next"

[build.environment]
  NODE_VERSION = "22"
  # Bump Node's max old-space size for the build. Default is ~1.5 GB on
  # the Linux build agents, which has been hitting OOM during the
  # `next build` step now that the bundle includes Open Banking 11 MB
  # of vendored data + Anthropic SDK + Upstash Box + zod + the compiled
  # brain dist. Failures verified post-PR #515 (2026-05-15 17:00+ UTC):
  # local builds succeed (this dev box has 16 GB+), Netlify builds fail
  # with exit code 2 on the same SHA. 8 GB is well inside Netlify's
  # build-agent ceiling and gives webpack room to grow further before
  # we have to do another bundle-shrink pass.
  NODE_OPTIONS = "--max-old-space-size=8192"
  # NEXT_PUBLIC_COMMIT_SHA is injected via the build command (NEXT_PUBLIC_COMMIT_SHA=$COMMIT_REF npm run build)
  # because TOML [build.environment] values are NOT shell-expanded — "$COMMIT_REF" would be
  # stored as the literal 7-char string, making .slice(0,7) return "$COMMIT".
  # Exclude LSEG credential env vars from Netlify secrets scanning so that
  # any incidental appearance of credentials in build logs or docs doesn't
  # block the deploy.  The actual values are never committed to source.
  SECRETS_SCAN_OMIT_KEYS = "LSEG_USERNAME,LSEG_PASSWORD,LSEG_APP_KEY,LSEG_SQS_ENDPOINT"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Look for the scheduled Netlify Function(s) at the repo root.
  directory = "netlify/functions"
  # Bundle the compiled brain + policy + integrations modules.
  # weaponized.ts imports ../policy/systemPrompt.js transitively, and the
  # mlro-advisor-deep-background function imports invokeMlroAdvisor +
  # the quality gates from dist/src/integrations.
  included_files = [
    "dist/src/brain/**/*.js",
    "dist/src/brain/**/*.js.map",
    "dist/src/policy/**/*.js",
    "dist/src/policy/**/*.js.map",
    "dist/src/integrations/**/*.js",
    "dist/src/integrations/**/*.js.map",
    "data/**",
  ]

# MLRO deep background function — needs the full 15-minute platform ceiling
# (900 s) because the multi-perspective advisor pipeline can run three parallel
# Haiku calls followed by a synthesis pass.
[functions."mlro-advisor-deep-background"]
  timeout = 900

# Cold-start mitigation (audit follow-up #37). The
# `netlify/functions/warm-pool.mts` scheduled function pings the hot-path
# API routes every 4 minutes (well inside the AWS Lambda ~15-minute idle
# reclamation window). Combined with platform-side region-pinning this
# gives sub-300ms p95 cold starts on the screening path. Requires
# Netlify Pro plan + paid scheduler tier.

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # COOP=same-origin isolates the browsing context from cross-origin
    # popups/iframes — reduces Spectre attack surface. Safe addition.
    # NOTE: COEP=require-corp deliberately omitted — it would require
    # fonts.bunny.net responses to carry CORP=cross-origin, which they
    # don't, so enabling it would break the font load and the login page.
    Cross-Origin-Opener-Policy = "same-origin"
    # CSP is now set per-request by web/middleware.ts with a fresh nonce,
    # so 'unsafe-inline' is no longer needed. Multiple CSP headers
    # *intersect* (most-restrictive wins), so a static fallback here
    # would clash with the middleware-set policy. API routes (which don't
    # render HTML) get no CSP — script-src is moot for JSON responses.

# CORP=same-origin on API responses prevents cross-origin documents from
# embedding our JSON via <img>/<script> spec quirks. Defense-in-depth
# alongside the enforce() auth gate. Cache-Control: no-store ensures
# auth-dependent responses aren't cached at edge / browser layer.
[[headers]]
  for = "/api/*"
  [headers.values]
    Cross-Origin-Resource-Policy = "same-origin"
    Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"
