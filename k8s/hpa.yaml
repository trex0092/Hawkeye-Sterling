apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hawkeye-sterling
  namespace: hawkeye-sterling
  labels:
    app.kubernetes.io/name: hawkeye-sterling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hawkeye-sterling
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      # Conservative scale-down: compliance workloads should not cold-start
      # during a screening burst — keep pods warm for 5 minutes after load drops.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
