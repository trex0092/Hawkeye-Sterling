# External Secrets Operator — references secrets from a vault provider
# (HashiCorp Vault, AWS Secrets Manager, Azure Key Vault, GCP Secret Manager).
# Replace <vault-path> references with your actual secret paths.
# Requires the External Secrets Operator to be installed in the cluster.
# https://external-secrets.io/
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hawkeye-secrets
  namespace: hawkeye-sterling
  labels:
    app.kubernetes.io/name: hawkeye-sterling
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend          # configure per environment
    kind: ClusterSecretStore
  target:
    name: hawkeye-secrets
    creationPolicy: Owner
    deletionPolicy: Retain       # retain secret on ExternalSecret deletion for audit
  data:
    # Core authentication secrets
    - secretKey: SESSION_SECRET
      remoteRef:
        key: hawkeye/core
        property: session_secret
    - secretKey: JWT_SIGNING_SECRET
      remoteRef:
        key: hawkeye/core
        property: jwt_signing_secret
    - secretKey: JWT_SIGNING_SECRET_PREV
      remoteRef:
        key: hawkeye/core
        property: jwt_signing_secret_prev
    - secretKey: AUDIT_CHAIN_SECRET
      remoteRef:
        key: hawkeye/core
        property: audit_chain_secret
    - secretKey: ADMIN_TOKEN
      remoteRef:
        key: hawkeye/core
        property: admin_token
    # LLM providers
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: hawkeye/llm
        property: anthropic_api_key
    # Workflow integration
    - secretKey: ASANA_TOKEN
      remoteRef:
        key: hawkeye/integrations
        property: asana_token
    - secretKey: ONGOING_RUN_TOKEN
      remoteRef:
        key: hawkeye/core
        property: ongoing_run_token
    - secretKey: SANCTIONS_CRON_TOKEN
      remoteRef:
        key: hawkeye/core
        property: sanctions_cron_token
    # Rate limiting
    - secretKey: UPSTASH_REDIS_REST_URL
      remoteRef:
        key: hawkeye/infra
        property: upstash_redis_url
    - secretKey: UPSTASH_REDIS_REST_TOKEN
      remoteRef:
        key: hawkeye/infra
        property: upstash_redis_token
