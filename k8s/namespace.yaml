apiVersion: v1
kind: Namespace
metadata:
  name: hawkeye-sterling
  labels:
    app.kubernetes.io/name: hawkeye-sterling
    app.kubernetes.io/managed-by: helm
    # Pod Security Standards — restricted is the most secure profile.
    # The hawkeye-sterling deployment satisfies all restricted requirements:
    # non-root user (1001:1001), readOnlyRootFilesystem: true, no privilege
    # escalation, capabilities drop ALL, seccompProfile: RuntimeDefault.
    # Enforce on the version we're targeting to prevent drift on cluster upgrades.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
