# Hawkeye Sterling — label manifest.
# Compliance-domain taxonomy to replace / augment the nine GitHub defaults.
# Synced to the repo by .github/workflows/labels.yml (EndBug/label-sync).
# Colours: hex without the leading `#`.

# ─── type ────────────────────────────────────────────────────────────────
- name: 'type/bug'
  color: 'b60205'
  description: Something is broken
- name: 'type/feature'
  color: 'a2eeef'
  description: New capability
- name: 'type/enhancement'
  color: '84b6eb'
  description: Improvement to an existing capability
- name: 'type/refactor'
  color: 'c2e0c6'
  description: Internal refactor with no behaviour change
- name: 'type/docs'
  color: '0075ca'
  description: Documentation only
- name: 'type/test'
  color: 'bfd4f2'
  description: Adds or changes tests
- name: 'type/chore'
  color: 'fef2c0'
  description: Build, CI, tooling, lint
- name: 'type/security'
  color: 'd93f0b'
  description: Security vulnerability or hardening
- name: 'type/perf'
  color: 'f9d0c4'
  description: Performance work
- name: 'type/a11y'
  color: '5319e7'
  description: Accessibility

