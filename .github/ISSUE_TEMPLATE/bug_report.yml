name: Bug report
description: Report a defect in Hawkeye Sterling
title: "[bug] "
labels: [type/bug, status/triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please complete the fields below.

        > ⚠️ Do **not** include real customer PII, sanctions hits, or secrets in this issue.
        > For a security vulnerability, follow [SECURITY.md](../blob/main/SECURITY.md) — do not file a public issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages / stack traces (redacted).
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: e.g. web/lib/server/…, src/brain/…
  - type: input
    id: version
    attributes:
      label: Commit / branch and Node version
      placeholder: e.g. main @ 46eccbd, Node 22
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Affects a regulated route / compliance output
        - Affects auth, audit chain, or egress gate
        - Cosmetic / non-blocking
    validations:
      required: true
  - type: checkboxes
    id: hygiene
    attributes:
      label: Before submitting
      options:
        - label: This issue contains no real PII, sanctions hits, or secrets
          required: true
        - label: I searched existing issues for a duplicate
          required: true
