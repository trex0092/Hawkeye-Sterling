name: Release

# SLSA level 2 provenance + Cosign signing for tagged releases.
# Triggered only on version tags (v*.*.*). Produces:
#   - SLSA provenance JSON (intoto envelope) for the dist tarball
#   - Signed osint-bridge Docker image via Cosign (sigstore transparency log)
#   - Release SBOM (CycloneDX) attached to the GitHub release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write      # required for OIDC-based Cosign + SLSA generator
  packages: write      # required for ghcr.io image push

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install root dependencies
        run: npm ci --include=dev --no-audit --no-fund

      - name: Install web dependencies
        run: cd web && npm ci --include=dev --no-audit --no-fund

      - name: Build TypeScript
        run: npm run build

      - name: Create dist tarball
        run: |
          tar -czf hawkeye-sterling-${{ github.ref_name }}.tar.gz \
            dist/ \
            web/lib/ \
            web/app/ \
            package.json \
            --exclude='**/node_modules' \
            --exclude='**/.next'

      - name: Compute SHA-256 hashes
        id: hash
        run: |
          sha256sum hawkeye-sterling-${{ github.ref_name }}.tar.gz > checksums.sha256
          echo "hashes=$(cat checksums.sha256 | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM for release
        run: |
          npm sbom --sbom-format cyclonedx --sbom-type library --omit dev \
            > hawkeye-sterling-${{ github.ref_name }}.cdx.json 2>/dev/null \
            || echo '{"bomFormat":"CycloneDX","specVersion":"1.4","note":"SBOM incomplete"}' \
              > hawkeye-sterling-${{ github.ref_name }}.cdx.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: |
            hawkeye-sterling-${{ github.ref_name }}.tar.gz
            hawkeye-sterling-${{ github.ref_name }}.cdx.json
            checksums.sha256

      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hawkeye-sterling-${{ github.ref_name }}.tar.gz
            hawkeye-sterling-${{ github.ref_name }}.cdx.json
            checksums.sha256

  # SLSA provenance generation — level 2 (signed build provenance)
  provenance:
    needs: build-and-sign
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build-and-sign.outputs.hashes }}"
      upload-assets: true

  # Cosign signing of the osint-bridge Docker image (services/osint-bridge/)
  sign-osint-bridge:
    runs-on: ubuntu-latest
    needs: build-and-sign
    if: ${{ hashFiles('services/osint-bridge/Dockerfile') != '' }}
    permissions:
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push osint-bridge image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: services/osint-bridge
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/osint-bridge:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/osint-bridge:latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless OIDC)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/osint-bridge@${{ steps.docker-build.outputs.digest }}
