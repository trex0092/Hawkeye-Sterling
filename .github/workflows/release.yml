name: Release

# Release pipeline: build/SBOM/scan/sign on v*.*.* tag pushes.
# SLSA level 2 provenance is generated by release-provenance.yml via
# workflow_run after this workflow completes on a tag push.
#
# IMPORTANT: on:push has NO filter. A push:tags-only filter causes GitHub to
# create run records for branch pushes with 0 jobs → phantom failure →
# notification. No filter means every push creates real jobs so GitHub can
# report a proper success conclusion.
#
# guard always runs unconditionally and exits 0.  On non-tag events it is
# the only job that runs, giving GitHub a successful result.  On tag pushes
# it also runs (no harm) while the build/scan/sign jobs do the real work.
# Security gate order: build → scan (Trivy) → sign (Cosign).

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  guard:
    name: Release guard
    runs-on: ubuntu-latest
    steps:
      - name: Report ref
        run: |
          echo "ref: ${{ github.ref }}"
          echo "event: ${{ github.event_name }}"

  build-and-sign:
    name: Build, SBOM, sign
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: guard
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          sbom: true
          provenance: true
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
      - name: Install Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0
      - name: Generate SBOM
        run: |
          syft ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            -o spdx-json=sbom.spdx.json
      - name: Attest SBOM
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

  scan-osint-bridge:
    name: Trivy scan — osint-bridge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-sign
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  sign-osint-bridge:
    name: Cosign sign — osint-bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-and-sign, scan-osint-bridge]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign osint-bridge image
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/osint-bridge:${{ github.ref_name }}
