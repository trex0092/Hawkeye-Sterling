name: Release

# Release pipeline: runs the full build/scan/sign pipeline on v*.*.* tag pushes.
# On branch pushes and PRs to main the guard job exits 0 so GitHub
# counts this workflow as success (no failure notification).
#
# SLSA level 2 provenance is generated by release-provenance.yml via
# workflow_run after this workflow completes on a tag push.

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # On every non-tag event this job runs and exits 0.
  # GitHub then counts the workflow as success — no failure notification.
  guard:
    name: Release (non-tag — skip)
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Not a release tag
        run: echo "Release workflow skipped — not a v*.*.* tag push."

  build-and-sign:
    name: Build, SBOM, sign
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install root dependencies
        run: npm ci --include=dev --no-audit --no-fund

      - name: Install web dependencies
        run: cd web && npm ci --include=dev --no-audit --no-fund

      - name: Build TypeScript
        run: npm run build

      - name: Create dist tarball
        run: |
          tar -czf hawkeye-sterling-${{ github.ref_name }}.tar.gz \
            dist/ web/lib/ web/app/ package.json \
            --exclude='**/node_modules' --exclude='**/.next'

      - name: Compute SHA-256 hashes
        id: hash
        run: |
          sha256sum hawkeye-sterling-${{ github.ref_name }}.tar.gz > checksums.sha256
          echo "hashes=$(base64 -w0 < checksums.sha256)" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        run: |
          npm sbom --sbom-format cyclonedx --sbom-type library --omit dev \
            > hawkeye-sterling-${{ github.ref_name }}.cdx.json \
            || npm sbom --sbom-format cyclonedx --sbom-type library \
              > hawkeye-sterling-${{ github.ref_name }}.cdx.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.ref_name }}
          path: |
            hawkeye-sterling-${{ github.ref_name }}.tar.gz
            hawkeye-sterling-${{ github.ref_name }}.cdx.json
            checksums.sha256

      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hawkeye-sterling-${{ github.ref_name }}.tar.gz
            hawkeye-sterling-${{ github.ref_name }}.cdx.json
            checksums.sha256

  scan-osint-bridge:
    name: Trivy scan — osint-bridge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-sign
    if: ${{ startsWith(github.ref, 'refs/tags/v') && hashFiles('services/osint-bridge/Dockerfile') != '' }}
    permissions:
      security-events: write
      packages: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally for scanning
        uses: docker/build-push-action@v6
        with:
          context: services/osint-bridge
          push: false
          load: true
          tags: osint-bridge:scan-${{ github.ref_name }}

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: osint-bridge:scan-${{ github.ref_name }}
          format: sarif
          output: trivy-container.sarif
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: false

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container

  sign-osint-bridge:
    name: Cosign sign — osint-bridge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-sign, scan-osint-bridge]
    if: ${{ startsWith(github.ref, 'refs/tags/v') && hashFiles('services/osint-bridge/Dockerfile') != '' }}
    permissions:
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push osint-bridge image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: services/osint-bridge
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/osint-bridge:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/osint-bridge:latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless OIDC)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/osint-bridge@${{ steps.docker-build.outputs.digest }}
