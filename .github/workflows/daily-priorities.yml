name: Daily Asana Priorities

# Runs the daily-priorities script that asks Claude to pick the top 10 tasks
# in every Asana project and posts the list as a comment on a pinned
# "📌 Today's Priorities" task inside each project.
#
# Also archives every generated artefact under history/daily/YYYY-MM-DD/
# and commits the archive back to main so the 10-year retention
# obligation under Federal Decree-Law No. 10 of 2025 is satisfied by the
# repository's own history.
#
# Schedule: every weekday (Mon–Fri) at 09:00 Asia/Dubai (05:00 UTC).
# Can also be triggered manually from the Actions tab with a Dry Run option.

on:
  schedule:
    - cron: "0 5 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no comments posted)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: daily-priorities
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: Prioritize and comment
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run daily priorities
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node daily-priorities.mjs

      - name: Commit history archive
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Daily compliance archive: $(date -u +%Y-%m-%d)"
            git push origin main
          else
            echo "No new history files to commit."
          fi
