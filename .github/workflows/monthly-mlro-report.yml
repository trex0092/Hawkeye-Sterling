name: Monthly MLRO Consolidation Report

# First business day of each month at 09:00 Asia/Dubai (05:00 UTC).
# Consolidates the previous month's weekly MLRO reports, weekly pattern
# reports, daily retros and daily portfolio digests into a formal
# monthly report from the MLRO to Senior Management and the Board.
#
# The cron fires on the 1st, 2nd and 3rd of every month at 05:00 UTC.
# The script itself runs only once per month because the target month
# is derived from the current date and the archive already contains
# the previous run; GitHub Actions has no weekday-of-month trigger, so
# this is the cleanest way to approximate "first business day".

on:
  schedule:
    - cron: "0 5 1-3 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no comments posted)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: monthly-mlro-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: Monthly MLRO consolidation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Skip if not first business day of month
        id: check
        run: |
          dom=$(date -u +%d)
          dow=$(date -u +%u)
          # Run on day 1 if Mon-Fri; on day 2 if day 1 was Sat; on day 3 if day 1 was Fri (Mon)
          if [ "$dom" = "01" ] && [ "$dow" -le "5" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$dom" = "02" ] && [ "$dow" = "1" ]; then
            # Day 2 is Monday, so day 1 was Sunday
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$dom" = "03" ] && [ "$dow" = "1" ]; then
            # Day 3 is Monday, so day 1 was Saturday
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi
          echo "First business day gate: run=$(cat $GITHUB_OUTPUT | grep run= | head -1)"

      - name: Setup Node.js
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run monthly MLRO report
        if: steps.check.outputs.run == 'true'
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          MLRO_NAME: ${{ secrets.MLRO_NAME }}
          ENTITY_LEGAL_NAME: ${{ secrets.ENTITY_LEGAL_NAME }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node monthly-mlro-report.mjs

      - name: Commit history archive
        if: ${{ always() && steps.check.outputs.run == 'true' && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Monthly MLRO consolidation archive: $(date -u +%Y-%m)"
            git push origin "${GITHUB_REF#refs/heads/}"
          else
            echo "No new history files to commit."
          fi
