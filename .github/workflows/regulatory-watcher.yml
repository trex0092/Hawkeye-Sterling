name: Daily Regulatory Update Watcher

# Runs every weekday at 06:00 UTC (10:00 Asia/Dubai). Fetches the
# configured regulator pages (MOE, EOCN, CBUAE, FATF), diffs the
# content hash against the last stored snapshot, and writes a daily
# change report to history/registers/regulatory-updates/. Attaches
# the report to the pinned portfolio task and posts a headline comment.

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Asana posts)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: regulatory-watcher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: Regulatory watcher
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run regulatory watcher
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          MLRO_NAME: ${{ secrets.MLRO_NAME }}
          ENTITY_LEGAL_NAME: ${{ secrets.ENTITY_LEGAL_NAME }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node regulatory-watcher.mjs

      - name: Commit history archive
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Regulatory watcher archive: $(date -u +%Y-%m-%d)"
            git push origin main
          else
            echo "No new history files to commit."
          fi
