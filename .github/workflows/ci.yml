name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Type check
        run: npm run typecheck
      - name: Tests
        run: npx vitest run --reporter=default
      - name: Brain audit
        run: npm run brain:audit
      - name: Prefix extractor check
        run: node scripts/extract-prefixes.cjs > /tmp/prefixes.ts && test -s /tmp/prefixes.ts
      - name: Capabilities extractor check
        run: test -f scripts/gen-capabilities.cjs
      - name: Red-flag extractor check
        run: test -f scripts/gen-redflags.cjs

  nextjs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - name: Install root dependencies
        run: npm ci --include=dev
      - name: Compile TypeScript (root)
        run: npm run build
      - name: Generate weaponized brain
        run: node scripts/gen-weaponized-brain.cjs
      - name: Install web dependencies
        run: cd web && npm ci --include=dev
      - name: Build Next.js app
        run: cd web && npm run build
        env:
          NODE_ENV: production
