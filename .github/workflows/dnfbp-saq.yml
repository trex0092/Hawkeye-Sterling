name: DNFBP Self-Assessment Questionnaire (on demand)

# On-demand utility that the MLRO triggers when the Ministry of Economy
# collects the DNFBP self-assessment questionnaire. Produces a pre-fill
# of the answers the firm would give to the standard topic areas the MOE
# asks about, so that when the MLRO opens the official template she is
# reviewing draft answers rather than starting from blank fields.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no comments posted)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: dnfbp-saq
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: DNFBP SAQ pre-fill
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run DNFBP SAQ pre-fill
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node dnfbp-saq.mjs

      - name: Commit history archive
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "DNFBP SAQ draft: $(date -u +%Y-%m-%d)"
            git push origin "${GITHUB_REF#refs/heads/}"
          else
            echo "No new history files to commit."
          fi
