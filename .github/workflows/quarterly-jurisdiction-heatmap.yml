name: Quarterly Jurisdiction Heatmap

# First business day of April, July, October and January at 09:45
# Asia/Dubai (05:45 UTC), shortly after the quarterly MLRO report.

on:
  schedule:
    - cron: "45 5 1-3 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      target_quarter:
        description: "Target quarter (YYYY-Qn, default: previous quarter)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: quarterly-jurisdiction-heatmap
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: First business day gate
        id: check
        run: |
          dom=$(date -u +%d); dow=$(date -u +%u)
          if [ "$dom" = "01" ] && [ "$dow" -le "5" ]; then echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$dom" = "02" ] && [ "$dow" = "1" ]; then echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$dom" = "03" ] && [ "$dow" = "1" ]; then echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then echo "run=true" >> $GITHUB_OUTPUT
          else echo "run=false" >> $GITHUB_OUTPUT
          fi
      - if: steps.check.outputs.run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json
      - if: steps.check.outputs.run == 'true'
        working-directory: scripts
        run: npm install --omit=dev
      - if: steps.check.outputs.run == 'true'
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          MLRO_NAME: ${{ secrets.MLRO_NAME }}
          ENTITY_LEGAL_NAME: ${{ secrets.ENTITY_LEGAL_NAME }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          TARGET_QUARTER: ${{ github.event.inputs.target_quarter }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node quarterly-jurisdiction-heatmap.mjs
      - if: ${{ always() && steps.check.outputs.run == 'true' && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Quarterly jurisdiction heatmap: $(date -u +%Y)-Q$(( ($(date -u +%-m)-1) / 3 ))"
            git push origin "${GITHUB_REF#refs/heads/}"
          fi
