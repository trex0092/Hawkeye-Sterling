name: Annual MLRO Report

# First business day of each calendar year. Consolidates the four
# quarterly MLRO reports and the twelve monthly reports of the
# completed year into a single formal annual MLRO report to Senior
# Management and the Board.

on:
  schedule:
    - cron: "0 5 1-5 1 *"
  workflow_dispatch:
    inputs:
      target_year:
        description: "Target year (default: previous calendar year)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (no comments posted)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: annual-mlro-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: Annual MLRO report
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Skip if not first business day of the year
        id: check
        run: |
          dom=$(date -u +%d)
          dow=$(date -u +%u)
          mon=$(date -u +%m)
          if [ "$mon" != "01" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          elif [ "$dom" = "01" ] && [ "$dow" -le "5" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$dom" = "02" ] && [ "$dow" = "1" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$dom" = "03" ] && [ "$dow" = "1" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$dom" = "04" ] && [ "$dow" = "1" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$dom" = "05" ] && [ "$dow" = "1" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        if: steps.check.outputs.run == 'true'
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run annual MLRO report
        if: steps.check.outputs.run == 'true'
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          TARGET_YEAR: ${{ github.event.inputs.target_year }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node annual-mlro-report.mjs

      - name: Commit history archive
        if: ${{ always() && steps.check.outputs.run == 'true' && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Annual MLRO report: $(date -u +%Y)"
            git push origin "${GITHUB_REF#refs/heads/}"
          else
            echo "No new history files to commit."
          fi
