name: Annual Customer Exit Report

# 31 January at 10:30 Asia/Dubai. Produces the record of customer
# relationships exited for AML or CFT reasons during the previous year.

on:
  schedule:
    - cron: "30 6 31 1 *"
  workflow_dispatch:
    inputs:
      target_year:
        description: "Target year"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: annual-customer-exit-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json
      - working-directory: scripts
        run: npm install --omit=dev
      - working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          TARGET_YEAR: ${{ github.event.inputs.target_year }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node annual-customer-exit-report.mjs
      - if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Annual customer exit report: $(date -u +%Y)"
            git push origin main
          fi
