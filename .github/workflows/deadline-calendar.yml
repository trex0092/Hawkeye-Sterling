name: Daily Deadline Calendar

# Runs every weekday at 05:45 UTC (09:45 Asia/Dubai). Reads the
# deadlines.json calendar and produces a daily traffic-light report of
# upcoming compliance deadlines. Archives the report and attaches it
# to the pinned portfolio task with a headline comment.

on:
  schedule:
    - cron: "45 5 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Asana posts)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deadline-calendar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: Deadline calendar
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run deadline calendar
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          MLRO_NAME: ${{ secrets.MLRO_NAME }}
          ENTITY_LEGAL_NAME: ${{ secrets.ENTITY_LEGAL_NAME }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node deadline-calendar.mjs

      - name: Commit history archive
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Deadline calendar archive: $(date -u +%Y-%m-%d)"
            git push origin main
          else
            echo "No new history files to commit."
          fi
