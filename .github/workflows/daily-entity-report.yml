name: Daily Per-Entity Compliance Report

# Runs every weekday at 09:15 Asia/Dubai (05:15 UTC), fifteen minutes
# after Daily Asana Priorities, so the formal per-entity report lands
# on the pinned task of each project with the markdown and Word
# versions attached. Archive is committed to history/ for ten-year
# retention under the applicable provision of Federal Decree-Law
# No. 10 of 2025.

on:
  schedule:
    - cron: "15 5 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no comments or attachments posted)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: daily-entity-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: Daily per-entity report
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run daily entity report
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          MLRO_NAME: ${{ secrets.MLRO_NAME }}
          ENTITY_LEGAL_NAME: ${{ secrets.ENTITY_LEGAL_NAME }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node daily-entity-report.mjs

      - name: Commit history archive
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Daily entity-report archive: $(date -u +%Y-%m-%d)"
            git push origin "${GITHUB_REF#refs/heads/}"
          else
            echo "No new history files to commit."
          fi
