name: update-task-descriptions
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Update task descriptions
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: node update-task-descriptions.mjs 2>&1 | tee /tmp/descriptions-report.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: descriptions-report
          path: /tmp/descriptions-report.txt
