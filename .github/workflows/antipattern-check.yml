name: Error Handling Anti-Pattern Check

# Inspired by https://github.com/thedotmack/antipattern-czar
# Detects error-handling anti-patterns that lead to silent failures.

on:
  pull_request:
    paths: ['**.mjs', '**.js']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  antipattern-check:
    name: Detect error-handling anti-patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for swallowed errors
        run: |
          echo "=== Error Handling Anti-Pattern Scan ==="
          echo ""
          echo "Note: catch blocks with comments (/* ... */) are treated as"
          echo "intentionally documented and excluded from the count."
          echo ""
          ISSUES=0

          # Pattern 1: Truly empty catch blocks (no comment, no code)
          # Excludes: blocks with comments like /* optional */, /* skip */, etc.
          echo "--- Undocumented empty catch blocks ---"
          EMPTY=$(grep -rn 'catch\s*{\s*}' --include='*.mjs' --include='*.js' screening/ scripts/ claude-mem/ | grep -v 'node_modules' | grep -v '\.test\.' || true)
          if [ -n "$EMPTY" ]; then
            echo "$EMPTY"
            COUNT=$(echo "$EMPTY" | wc -l)
            echo "Found $COUNT undocumented empty catch block(s)"
            ISSUES=$((ISSUES + COUNT))
          else
            echo "None found"
          fi
          echo ""

          # Pattern 2: catch-and-return without logging (new code only)
          # Only flag in files changed in this PR
          echo "--- Catch-and-return without logging (changed files) ---"
          CHANGED=$(git diff --name-only origin/main...HEAD -- '*.mjs' '*.js' 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            SILENT=""
            for f in $CHANGED; do
              if [ -f "$f" ]; then
                HITS=$(grep -n -A1 'catch.*{' "$f" 2>/dev/null | grep 'return' | grep -v 'console\.\|process\.stderr\|logger\|warn\|error\|\/\*' || true)
                if [ -n "$HITS" ]; then
                  SILENT="${SILENT}${f}: ${HITS}\n"
                fi
              fi
            done
            if [ -n "$SILENT" ]; then
              echo -e "$SILENT"
              COUNT=$(echo -e "$SILENT" | grep -c '.' || true)
              ISSUES=$((ISSUES + COUNT))
            else
              echo "None found"
            fi
          else
            echo "No changed JS/MJS files"
          fi
          echo ""

          echo "=== Total issues: $ISSUES ==="
          if [ $ISSUES -gt 3 ]; then
            echo "FAIL: More than 3 undocumented error-handling anti-patterns."
            echo "Add a comment explaining why the error is intentionally ignored,"
            echo "or add proper error handling."
            exit 1
          fi
          echo "Anti-pattern check passed."
