name: Attach Compliance Forms

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  attach:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Attach forms to all tasks
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: node attach-compliance-forms.mjs 2>&1 | tee /tmp/attach-report.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attach-report
          path: /tmp/attach-report.txt
