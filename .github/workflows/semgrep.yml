# Standalone Semgrep SAST workflow — runs on push/PR to main and weekly.
#
# Mirrors the semgrep job in ci.yml: uses the semgrep/semgrep container image
# so no pip install is needed, gracefully handles missing SEMGREP_APP_TOKEN by
# emitting a warning and an empty SARIF rather than failing, and uses
# --config=auto as an offline fallback when registry packs are unavailable.
#
# SEMGREP_APP_TOKEN: set this repository secret to enable full cloud-based
# SAST scanning via Semgrep App. Without it, the scan emits a warning and
# exits cleanly so the workflow stays green.

name: Semgrep

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '38 5 * * 0'

permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.actor != 'dependabot[bot]'
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v7

      - name: Semgrep SAST scan
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          if [ -z "$SEMGREP_APP_TOKEN" ]; then
            echo "::warning::SEMGREP_APP_TOKEN not configured — remote rule packs require auth."
            echo "::warning::Set the SEMGREP_APP_TOKEN repo secret to enable full SAST scanning."
            printf '{"version":"2.1.0","runs":[]}\n' > semgrep-results.sarif
            exit 0
          fi
          semgrep scan \
            --config=p/typescript \
            --config=p/nodejs \
            --config=p/nextjs \
            --error \
            --severity=ERROR \
            --sarif \
            --output semgrep-results.sarif \
            src/ web/app/ web/lib/ netlify/ && SEMGREP_RC=0 || SEMGREP_RC=$?
          if [ ! -f semgrep-results.sarif ]; then
            printf '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}\n' > semgrep-results.sarif
          fi
          if [ "$SEMGREP_RC" -eq 7 ]; then
            echo "::warning::Semgrep registry auth failure (exit 7) — token may be expired. Full SAST unavailable."
            exit 0
          fi
          exit "$SEMGREP_RC"

      - name: Upload Semgrep SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
