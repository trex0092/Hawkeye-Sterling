name: Board Meeting AML Pack (on demand)

# On-demand utility the MLRO triggers ahead of a Board meeting.
# Consolidates the most recent weekly MLRO report, the most recent
# monthly MLRO consolidation, the last two weekly pattern reports and
# the current counterparty register into a Board-ready AML pack.

on:
  workflow_dispatch:
    inputs:
      board_meeting_date:
        description: "Board meeting date (YYYY-MM-DD, defaults to today)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (no comments posted)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: board-aml-pack
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: Board AML pack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run Board AML pack
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          BOARD_MEETING_DATE: ${{ github.event.inputs.board_meeting_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node board-aml-pack.mjs

      - name: Commit history archive
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Board AML pack: $(date -u +%Y-%m-%d)"
            git push origin "${GITHUB_REF#refs/heads/}"
          else
            echo "No new history files to commit."
          fi
