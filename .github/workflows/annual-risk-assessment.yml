name: Annual Enterprise-Wide Risk Assessment (draft)

# Runs once per year on 15 January at 09:00 Asia/Dubai (05:00 UTC) so a
# draft of the annual enterprise-wide AML and CFT risk assessment is
# ready on the MLRO's desk before the first standing Board meeting of
# the new financial year.
#
# Can also be triggered manually from the Actions tab, optionally with
# a TARGET_YEAR input if the MLRO wants to regenerate a specific year.

on:
  schedule:
    - cron: "0 5 15 1 *"
  workflow_dispatch:
    inputs:
      target_year:
        description: "Target year (default: previous calendar year)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (no comments posted)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: annual-risk-assessment
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: Annual risk assessment draft
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run annual risk assessment
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          MLRO_NAME: ${{ secrets.MLRO_NAME }}
          ENTITY_LEGAL_NAME: ${{ secrets.ENTITY_LEGAL_NAME }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          TARGET_YEAR: ${{ github.event.inputs.target_year }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node annual-risk-assessment.mjs

      - name: Commit history archive
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Annual risk assessment archive: $(date -u +%Y)"
            git push origin "${GITHUB_REF#refs/heads/}"
          else
            echo "No new history files to commit."
          fi
