name: Weekly Task Compliance Pack Upload

# Walks every Asana project, detects its reporting entity code, and
# uploads a Task Compliance Pack (.docx and .md) to every open task
# that is not the pinned priorities task. The pack carries customer
# identification, transaction details, red-flag assessment, sanctions
# and PEP screening, filing decision matrix and MLRO sign-off sections
# with blank fields ready to be completed.
#
# Runs every Monday at 04:00 UTC (08:00 Asia/Dubai) so a fresh pack
# is on every active task at the start of the working week. Can also
# be triggered manually from the Actions tab when the MLRO wants to
# refresh the packs across the workspace.

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Asana uploads)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_tasks_per_project:
        description: "Maximum number of tasks per project (safety cap)"
        required: false
        default: "200"
        type: string

concurrency:
  group: task-pack
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    name: Task pack uploader
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run task pack uploader
        working-directory: scripts
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_WORKSPACE_ID: ${{ secrets.ASANA_WORKSPACE_ID }}
          ASANA_TEAM_ID: ${{ secrets.ASANA_TEAM_ID }}
          MLRO_NAME: ${{ secrets.MLRO_NAME }}
          ENTITY_LEGAL_NAME: ${{ secrets.ENTITY_LEGAL_NAME }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5' }}
          PINNED_TASK_NAME: ${{ vars.PINNED_TASK_NAME || '📌 Today''s Priorities' }}
          PORTFOLIO_PROJECT_NAME: ${{ vars.PORTFOLIO_PROJECT_NAME || 'SCREENINGS' }}
          MAX_TASKS_PER_PROJECT: ${{ github.event.inputs.max_tasks_per_project || '200' }}
          THROTTLE_MS: "150"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node task-pack.mjs

      - name: Commit history archive
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "hawkeye-sterling-automation"
          git config user.email "automation@hawkeye-sterling.local"
          if [ -n "$(git status --porcelain history/ 2>/dev/null)" ]; then
            git add history/
            git commit -m "Task compliance pack archive: $(date -u +%Y-%m-%d)"
            git push origin "${GITHUB_REF#refs/heads/}"
          else
            echo "No new history files to commit."
          fi
